services:
  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: repriced-yahoo-api
    ports:
      - "3000:3000"
    environment:
      PORT: 3000
      NODE_ENV: production
      MONGO_URI: mongodb://mongo:27017/repriced-yahoo
      REDIS_HOST: redis
      REDIS_PORT: 6379
      YAHOO_CLIENT_ID: ${YAHOO_CLIENT_ID}
      YAHOO_CLIENT_SECRET: ${YAHOO_CLIENT_SECRET}
      YAHOO_REDIRECT_URI: ${YAHOO_REDIRECT_URI:-http://localhost:3000/api/yahoo/callback}
      YAHOO_IMAP_HOST: imap.mail.yahoo.com
      YAHOO_IMAP_PORT: 993
    depends_on:
      - mongo
      - redis
    restart: unless-stopped

  worker:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: repriced-yahoo-worker
    command: npm run worker
    environment:
      PORT: 3000
      NODE_ENV: production
      MONGO_URI: mongodb://mongo:27017/repriced-yahoo
      REDIS_HOST: redis
      REDIS_PORT: 6379
      YAHOO_CLIENT_ID: ${YAHOO_CLIENT_ID}
      YAHOO_CLIENT_SECRET: ${YAHOO_CLIENT_SECRET}
      YAHOO_REDIRECT_URI: ${YAHOO_REDIRECT_URI:-http://localhost:3000/api/yahoo/callback}
      YAHOO_IMAP_HOST: imap.mail.yahoo.com
      YAHOO_IMAP_PORT: 993
    depends_on:
      - mongo
      - redis
    restart: unless-stopped

  mongo:
    image: mongo:7
    container_name: repriced-yahoo-mongo
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    container_name: repriced-yahoo-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes
    restart: unless-stopped

volumes:
  mongo_data:
  redis_data:
